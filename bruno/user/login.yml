info:
  name: login
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:3000/login
  body:
    type: json
    data: |-
      {
        "email": "admin@pwiiadmin.com",
        "password": "admin123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setVar("at", res.body.token)
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
